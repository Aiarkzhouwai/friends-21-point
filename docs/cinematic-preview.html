<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>牌型大招动画预览</title>
    <style>
      :root {
        color-scheme: dark;
        --gold: #f5c85f;
        --red: #e7473f;
        --ink: #070a10;
        --felt: #08733c;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        color: #f8f3e7;
        background:
          radial-gradient(circle at 50% 18%, rgba(22, 128, 78, 0.32), transparent 34%),
          linear-gradient(135deg, #101722 0%, #070a10 58%, #121821 100%);
        overflow: hidden;
      }

      main {
        display: grid;
        min-height: 100dvh;
        grid-template-rows: auto 1fr auto;
        gap: 16px;
        padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(22px, 4vw, 36px);
      }

      p {
        color: #a8b2bd;
        font-size: 14px;
      }

      .table {
        position: relative;
        min-height: 420px;
        border-radius: 42px;
        background:
          radial-gradient(ellipse at center, rgba(20, 148, 83, 0.95), rgba(5, 54, 32, 0.98) 70%),
          var(--felt);
        box-shadow:
          inset 0 0 0 10px #101217,
          inset 0 0 0 16px #262323,
          inset 0 0 0 22px #050607,
          0 26px 70px rgba(0, 0, 0, 0.55);
        overflow: hidden;
      }

      .table::after {
        position: absolute;
        inset: 38px;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 34px;
        content: "";
      }

      .dummy-seat {
        position: absolute;
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      .dummy-seat.top {
        top: 28px;
        left: 50%;
        transform: translateX(-50%);
      }

      .dummy-seat.left {
        left: 26px;
        top: 44%;
        transform: translateY(-50%);
      }

      .dummy-seat.right {
        right: 26px;
        top: 44%;
        transform: translateY(-50%);
      }

      .cards {
        display: flex;
      }

      .card {
        display: grid;
        width: 46px;
        height: 64px;
        margin-left: -10px;
        place-items: center;
        border: 1px solid rgba(15, 18, 24, 0.16);
        border-radius: 8px;
        color: #151922;
        background: linear-gradient(155deg, #fff, #f2eee6);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.32);
        font-size: 18px;
        font-weight: 950;
      }

      .card:first-child {
        margin-left: 0;
      }

      .nameplate {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        padding: 7px 12px;
        background: rgba(8, 12, 18, 0.84);
        color: #fff4c7;
        font-weight: 850;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      button {
        min-height: 52px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 10px;
        color: #f8f3e7;
        background: linear-gradient(#242c39, #141a23);
        box-shadow: inset 0 1px rgba(255, 255, 255, 0.1), 0 8px 20px rgba(0, 0, 0, 0.26);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .cinematic {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        place-items: center;
        overflow: hidden;
        background: rgba(2, 4, 8, 0.72);
      }

      .cinematic.show {
        display: grid;
        animation: overlayIn 180ms ease both;
      }

      .cinematic.out {
        animation: overlayOut 260ms ease both;
      }

      .burst-lines {
        position: absolute;
        inset: -12%;
        opacity: 0.75;
        background:
          repeating-conic-gradient(from 4deg, rgba(255, 255, 255, 0.2) 0deg 2deg, transparent 2deg 9deg),
          radial-gradient(circle, transparent 0 18%, rgba(0, 0, 0, 0.4) 58%, rgba(0, 0, 0, 0.82));
        animation: spinPop 1.6s ease-out both;
      }

      .cinematic-card {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 18px;
        width: min(760px, 92vw);
        padding: 28px 18px;
        text-align: center;
      }

      .mega-title {
        position: relative;
        z-index: 4;
        margin: 0;
        color: #fff3b0;
        font-size: clamp(58px, 14vw, 132px);
        font-weight: 1000;
        letter-spacing: 0;
        line-height: 0.88;
        text-shadow:
          0 5px 0 #7b180e,
          0 10px 0 #2d0805,
          0 0 28px rgba(245, 200, 95, 0.65);
        transform: rotate(-3deg);
      }

      .cow-pack {
        position: relative;
        z-index: 3;
        display: flex;
        min-height: 166px;
        align-items: end;
        justify-content: center;
        gap: clamp(4px, 2vw, 14px);
      }

      .cow {
        position: relative;
        width: clamp(78px, 14vw, 128px);
        height: clamp(88px, 15vw, 142px);
        animation: cowCharge 1.45s cubic-bezier(0.15, 0.9, 0.25, 1.1) both;
        filter: drop-shadow(0 12px 10px rgba(0, 0, 0, 0.28));
      }

      .cow:nth-child(2) {
        animation-delay: 60ms;
        transform: rotate(-4deg);
      }

      .cow:nth-child(3) {
        animation-delay: 120ms;
      }

      .cow:nth-child(4) {
        animation-delay: 180ms;
        transform: rotate(5deg);
      }

      .cow:nth-child(5) {
        animation-delay: 240ms;
      }

      .cow-body {
        position: absolute;
        inset: 57% 14% 0;
        border: 5px solid #191919;
        border-bottom: 0;
        border-radius: 50% 50% 18% 18%;
        background: #f7ecdc;
        box-shadow: inset -7px -8px 0 rgba(0, 0, 0, 0.08);
      }

      .cow-body::before,
      .cow-body::after {
        position: absolute;
        border-radius: 999px;
        background: #161616;
        content: "";
      }

      .cow-body::before {
        width: 28%;
        height: 34%;
        left: 18%;
        bottom: 18%;
        background: #b9b0aa;
        transform: rotate(-15deg);
      }

      .cow-body::after {
        width: 22%;
        height: 28%;
        right: 16%;
        bottom: 12%;
        background: #b9b0aa;
        transform: rotate(18deg);
      }

      .cow-head {
        position: absolute;
        left: 50%;
        top: 9%;
        width: 72%;
        height: 64%;
        border: 5px solid #191919;
        border-radius: 46% 48% 45% 44%;
        background: #f8efe1;
        transform: translateX(-50%);
        box-shadow: inset -6px -7px 0 rgba(0, 0, 0, 0.06);
      }

      .cow-head::before,
      .cow-head::after {
        position: absolute;
        top: -2%;
        z-index: -1;
        width: 44%;
        height: 34%;
        border: 5px solid #191919;
        border-radius: 64% 28% 62% 32%;
        background: #f4dfbf;
        content: "";
      }

      .cow-head::before {
        left: -34%;
        transform: rotate(-30deg);
      }

      .cow-head::after {
        right: -34%;
        transform: rotate(30deg) scaleX(-1);
      }

      .horn {
        position: absolute;
        top: -24%;
        z-index: -2;
        width: 30%;
        height: 36%;
        border: 5px solid #191919;
        border-bottom: 0;
        border-radius: 80% 80% 20% 20%;
        background: #fff0cf;
      }

      .horn.left {
        left: -16%;
        transform: rotate(-38deg);
      }

      .horn.right {
        right: -16%;
        transform: rotate(38deg);
      }

      .forehead {
        position: absolute;
        left: 16%;
        top: 5%;
        width: 32%;
        height: 28%;
        border-radius: 44% 42% 55% 45%;
        background: #bdb5af;
        opacity: 0.9;
        transform: rotate(10deg);
      }

      .hair {
        position: absolute;
        left: 50%;
        top: -13%;
        width: 7px;
        height: 17px;
        border-radius: 999px;
        background: #191919;
        transform-origin: bottom;
      }

      .hair:nth-of-type(3) {
        transform: translateX(-50%) rotate(-28deg);
      }

      .hair:nth-of-type(4) {
        transform: translateX(-50%) rotate(0deg);
      }

      .hair:nth-of-type(5) {
        transform: translateX(-50%) rotate(28deg);
      }

      .eye {
        position: absolute;
        top: 30%;
        width: 24%;
        height: 27%;
        border: 5px solid #191919;
        border-radius: 999px;
        background: #fff;
      }

      .eye.left {
        left: 18%;
      }

      .eye.right {
        right: 18%;
      }

      .eye::after {
        position: absolute;
        left: 42%;
        top: 34%;
        width: 32%;
        height: 34%;
        border-radius: 999px;
        background: #111;
        content: "";
      }

      .snout {
        position: absolute;
        left: 50%;
        bottom: -2%;
        width: 76%;
        height: 34%;
        border: 5px solid #191919;
        border-radius: 48% 48% 40% 42%;
        background: #ead9cb;
        transform: translateX(-50%) rotate(1deg);
      }

      .snout::before,
      .snout::after {
        position: absolute;
        top: 35%;
        width: 18%;
        height: 34%;
        border-radius: 999px;
        background: #111;
        content: "";
      }

      .snout::before {
        left: 24%;
        transform: rotate(-18deg);
      }

      .snout::after {
        right: 24%;
        transform: rotate(18deg);
      }

      .mouth {
        position: absolute;
        left: 50%;
        bottom: -17%;
        width: 30%;
        height: 26%;
        border: 5px solid #191919;
        border-top: 0;
        border-radius: 0 0 999px 999px;
        background: #111;
        transform: translateX(-50%);
      }

      .tooth {
        position: absolute;
        bottom: -12%;
        width: 12%;
        height: 18%;
        border: 3px solid #191919;
        border-top: 0;
        border-radius: 0 0 8px 8px;
        background: #fff;
      }

      .tooth.left {
        left: 35%;
      }

      .tooth.right {
        right: 35%;
      }

      .spark {
        position: absolute;
        z-index: 1;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 18px var(--gold);
        animation: sparkFly 1.3s ease-out both;
      }

      .twenty-one .burst-lines {
        background:
          repeating-conic-gradient(from 12deg, rgba(114, 198, 255, 0.35) 0deg 2deg, transparent 2deg 12deg),
          radial-gradient(circle, rgba(20, 91, 155, 0.72), rgba(0, 0, 0, 0.86) 62%);
      }

      .twenty-one .mega-title {
        color: #eaffff;
        text-shadow:
          0 5px 0 #125d9b,
          0 10px 0 #082844,
          0 0 32px rgba(114, 198, 255, 0.9);
        animation: slashHit 1.25s ease both;
      }

      .slash {
        position: absolute;
        z-index: 2;
        width: min(580px, 88vw);
        height: 16px;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, #eaffff, #6ecbff, transparent);
        box-shadow: 0 0 28px rgba(114, 198, 255, 0.95);
        transform: rotate(-15deg) scaleX(0);
        animation: slashLine 900ms ease-out both;
      }

      .bust .burst-lines {
        background:
          repeating-conic-gradient(from 0deg, rgba(231, 71, 63, 0.36) 0deg 3deg, transparent 3deg 10deg),
          radial-gradient(circle, rgba(122, 13, 16, 0.82), rgba(0, 0, 0, 0.9) 64%);
      }

      .bust .mega-title {
        color: #fff;
        text-shadow:
          0 5px 0 #9d1711,
          0 10px 0 #320605,
          0 0 32px rgba(231, 71, 63, 0.9);
        animation: bustShake 900ms ease both;
      }

      .cracked-card {
        position: absolute;
        z-index: 2;
        width: 110px;
        height: 154px;
        border: 3px solid #171717;
        border-radius: 12px;
        background: #fff7e8;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.44);
        transform: rotate(10deg);
        animation: crackedCard 1.35s ease both;
      }

      .cracked-card::before {
        position: absolute;
        inset: 18px 44px 18px 48px;
        border-left: 6px solid var(--red);
        transform: skew(-18deg);
        content: "";
      }

      @keyframes overlayIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes overlayOut {
        to {
          opacity: 0;
          transform: scale(1.02);
        }
      }

      @keyframes spinPop {
        from {
          opacity: 0;
          transform: scale(0.8) rotate(-24deg);
        }
        to {
          opacity: 0.78;
          transform: scale(1.05) rotate(4deg);
        }
      }

      @keyframes cowCharge {
        0% {
          opacity: 0;
          transform: translateY(120px) rotate(-14deg) scale(0.5);
        }
        58% {
          opacity: 1;
          transform: translateY(-12px) rotate(7deg) scale(1.12);
        }
        74% {
          transform: translateY(4px) rotate(-4deg) scale(0.96);
        }
        100% {
          opacity: 1;
          transform: translateY(0) rotate(0deg) scale(1);
        }
      }

      @keyframes sparkFly {
        from {
          opacity: 0;
          transform: translate(0, 0) scale(0.2);
        }
        20% {
          opacity: 1;
        }
        to {
          opacity: 0;
          transform: translate(var(--x), var(--y)) scale(1);
        }
      }

      @keyframes slashLine {
        0% {
          opacity: 0;
          transform: rotate(-15deg) scaleX(0);
        }
        35% {
          opacity: 1;
          transform: rotate(-15deg) scaleX(1);
        }
        100% {
          opacity: 0;
          transform: rotate(-15deg) scaleX(1.04) translateX(80px);
        }
      }

      @keyframes slashHit {
        from {
          opacity: 0;
          transform: translateX(-60px) skew(-12deg) scale(0.72);
        }
        55% {
          opacity: 1;
          transform: translateX(12px) skew(-12deg) scale(1.12);
        }
        to {
          opacity: 1;
          transform: translateX(0) skew(-8deg) scale(1);
        }
      }

      @keyframes bustShake {
        0% {
          opacity: 0;
          transform: rotate(4deg) scale(0.7);
        }
        35% {
          opacity: 1;
          transform: rotate(-6deg) scale(1.14);
        }
        46% {
          transform: rotate(5deg) scale(1.04);
        }
        58% {
          transform: rotate(-4deg) scale(1.08);
        }
        100% {
          transform: rotate(-2deg) scale(1);
        }
      }

      @keyframes crackedCard {
        from {
          opacity: 0;
          transform: translateY(-120px) rotate(-18deg) scale(0.65);
        }
        52% {
          opacity: 1;
          transform: translateY(8px) rotate(10deg) scale(1.08);
        }
        to {
          opacity: 0.88;
          transform: translateY(0) rotate(10deg) scale(1);
        }
      }

      @media (orientation: portrait) {
        .table {
          min-height: 58dvh;
        }

        .controls {
          grid-template-columns: 1fr;
        }

        .cow-pack {
          flex-wrap: wrap;
        }

        .mega-title {
          font-size: clamp(52px, 18vw, 96px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>牌型大招动画预览</h1>
          <p>独立预览页，不影响线上游戏代码。建议横屏看。</p>
        </div>
      </header>

      <section class="table" aria-label="牌桌背景">
        <div class="dummy-seat top">
          <div class="cards">
            <span class="card">A♠</span>
            <span class="card">K♥</span>
          </div>
          <span class="nameplate">You · 21点</span>
        </div>
        <div class="dummy-seat left">
          <div class="cards">
            <span class="card">2♣</span>
            <span class="card">3♦</span>
            <span class="card">4♠</span>
            <span class="card">5♥</span>
            <span class="card">6♣</span>
          </div>
          <span class="nameplate">朋友 · 五小牛</span>
        </div>
        <div class="dummy-seat right">
          <div class="cards">
            <span class="card">K♣</span>
            <span class="card">Q♦</span>
            <span class="card">5♥</span>
          </div>
          <span class="nameplate">庄家 · 爆牌</span>
        </div>
      </section>

      <nav class="controls" aria-label="动画控制">
        <button type="button" data-kind="five">五小牛！</button>
        <button type="button" data-kind="twenty-one">21点！</button>
        <button type="button" data-kind="bust">爆牌！</button>
      </nav>
    </main>

    <section class="cinematic" id="cinematic" aria-live="polite"></section>

    <script>
      const overlay = document.querySelector("#cinematic");
      const buttons = document.querySelectorAll("[data-kind]");
      let timer = null;

      function sparkHtml(count = 28) {
        return Array.from({ length: count }, (_, index) => {
          const angle = (Math.PI * 2 * index) / count;
          const distance = 120 + Math.random() * 220;
          const x = Math.cos(angle) * distance;
          const y = Math.sin(angle) * distance;
          const left = 45 + Math.random() * 10;
          const top = 44 + Math.random() * 12;
          return `<i class="spark" style="left:${left}%;top:${top}%;--x:${x}px;--y:${y}px"></i>`;
        }).join("");
      }

      function cowHtml(index) {
        return `
          <div class="cow" style="--cow:${index}">
            <div class="cow-body"></div>
            <div class="cow-head">
              <i class="horn left"></i>
              <i class="horn right"></i>
              <i class="hair"></i>
              <i class="hair"></i>
              <i class="hair"></i>
              <i class="forehead"></i>
              <i class="eye left"></i>
              <i class="eye right"></i>
              <i class="snout"></i>
              <i class="mouth"></i>
              <i class="tooth left"></i>
              <i class="tooth right"></i>
            </div>
          </div>
        `;
      }

      const scenes = {
        five: () => `
          <div class="burst-lines"></div>
          ${sparkHtml(36)}
          <div class="cinematic-card">
            <div class="cow-pack">${[1, 2, 3, 4, 5].map(cowHtml).join("")}</div>
            <h2 class="mega-title">五小牛！</h2>
          </div>
        `,
        "twenty-one": () => `
          <div class="burst-lines"></div>
          <i class="slash"></i>
          ${sparkHtml(20)}
          <div class="cinematic-card twenty-one">
            <h2 class="mega-title">21点！</h2>
          </div>
        `,
        bust: () => `
          <div class="burst-lines"></div>
          <i class="cracked-card"></i>
          ${sparkHtml(18)}
          <div class="cinematic-card bust">
            <h2 class="mega-title">爆了！</h2>
          </div>
        `,
      };

      function play(kind) {
        window.clearTimeout(timer);
        overlay.className = `cinematic show ${kind}`;
        overlay.innerHTML = scenes[kind]();
        timer = window.setTimeout(() => {
          overlay.classList.add("out");
          window.setTimeout(() => {
            overlay.className = "cinematic";
            overlay.innerHTML = "";
          }, 280);
        }, kind === "five" ? 2300 : 1800);
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => play(button.dataset.kind));
      });
    </script>
  </body>
</html>
