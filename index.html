<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>21 点朋友局</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="screen entry-screen active" id="entryScreen" aria-label="房间入口">
        <div class="entry-hero">
          <span class="eyebrow">朋友局 · 在线房间</span>
          <h1>21 点朋友局</h1>
          <p>创建房间，发给朋友，凑齐后开局。</p>
        </div>

        <div class="entry-panel">
          <label>
            昵称
            <input id="nicknameInput" maxlength="16" value="阿周" autocomplete="nickname" />
          </label>

          <button class="primary large" id="createRoomBtn" type="button">创建房间</button>

          <details class="room-settings">
            <summary>房间设置</summary>
            <div class="settings-grid">
              <label>
                房间人数
                <select id="maxPlayersInput">
                  <option value="3">3 人</option>
                  <option value="4">4 人</option>
                  <option value="5" selected>5 人</option>
                </select>
              </label>
              <label>
                出牌等待
                <select id="actionTimeoutInput">
                  <option value="20">20 秒</option>
                  <option value="30" selected>30 秒</option>
                  <option value="45">45 秒</option>
                  <option value="60">60 秒</option>
                </select>
              </label>
              <label>
                局数限制
                <select id="roundLimitInput">
                  <option value="0" selected>不限局数</option>
                  <option value="5">5 局</option>
                  <option value="10">10 局</option>
                  <option value="20">20 局</option>
                </select>
              </label>
              <label>
                时间限制
                <select id="timeLimitInput">
                  <option value="0" selected>不限时间</option>
                  <option value="15">15 分钟</option>
                  <option value="30">30 分钟</option>
                  <option value="60">60 分钟</option>
                </select>
              </label>
            </div>
          </details>

          <div class="join-box">
            <label>
              房间号
              <input id="roomCodeInput" inputmode="numeric" maxlength="6" placeholder="输入 6 位房间号" />
            </label>
            <button id="joinRoomBtn" type="button">加入房间</button>
          </div>

          <button class="ghost" id="continueRoomBtn" type="button">继续上次房间</button>

          <details class="advanced-settings">
            <summary>连接设置</summary>
            <label>
              后端地址
              <input id="apiBaseInput" placeholder="例如 https://your-app.onrender.com" />
            </label>
          </details>
        </div>

        <p class="service-line" id="entryStatus">在线服务已连接</p>
      </section>

      <section class="screen lobby-screen" id="lobbyScreen" aria-label="房间等待">
        <header class="lobby-header">
          <button class="icon-btn" id="leaveRoomBtn" type="button" aria-label="返回入口">‹</button>
          <div>
            <span class="eyebrow">房间号</span>
            <strong id="lobbyRoomCode">------</strong>
          </div>
          <button class="copy-btn" id="copyRoomBtn" type="button">复制</button>
        </header>

        <section class="lobby-card">
          <div class="lobby-card-head">
            <div>
              <span class="eyebrow">玩家</span>
              <h2 id="playerCountLabel">1/5</h2>
            </div>
            <span class="status-pill" id="connectionState">等待开局</span>
          </div>
          <div class="lobby-players" id="lobbyPlayers"></div>
        </section>

        <section class="rule-strip" id="ruleStrip" aria-label="桌规">
          <span>下注 10-50</span>
          <span>≤13 必须要牌</span>
          <span>超时自动托管</span>
          <span>可分牌</span>
          <span>爆庄换庄</span>
        </section>

        <div class="lobby-action">
          <button class="primary large" id="dealBtn" type="button">开始游戏</button>
          <p id="lobbyHint">至少 3 人开始；中途加入下一局参与。</p>
        </div>
      </section>

      <section class="screen game-screen" id="gameScreen" aria-label="21 点牌桌">
        <header class="table-topbar">
          <button class="icon-btn" id="backToLobbyBtn" type="button" aria-label="返回房间">‹</button>
          <div class="room-title">
            <strong>朋友局 21 点</strong>
            <span id="roundLabel">第 1 局 · 闲家回合</span>
          </div>
          <div class="table-counters">
            <span id="deckCount">牌库 52</span>
            <span id="discardCount">已用 0</span>
          </div>
        </header>

        <section class="poker-table" aria-label="圆桌牌局">
          <div class="table-felt" aria-hidden="true">
            <div class="table-rail"></div>
            <div class="table-center">
              <div class="deck-stack" id="deckStack">
                <div class="card back mini"></div>
                <div class="card back mini"></div>
                <div class="card back mini"></div>
              </div>
              <div class="center-status">
                <strong id="turnLabel">等待开局</strong>
                <span id="latestEvent">等待玩家操作</span>
              </div>
            </div>
          </div>

          <div id="dealerArea"></div>
          <div id="playersGrid"></div>
          <div class="showdown-banner" id="showdownBanner" aria-live="polite"></div>
        </section>

        <section class="my-zone" id="viewerArea" aria-label="我的手牌"></section>

        <div class="action-panel">
          <div class="turn-note" id="actionHint">等待其他玩家</div>
          <div class="bet-panel" id="betPanel">
            <div class="bet-head">
              <span>本局下注</span>
              <strong id="betAmountLabel">20</strong>
            </div>
            <div class="bet-options" id="betOptions">
              <button type="button" data-bet="10">10</button>
              <button type="button" data-bet="20">20</button>
              <button type="button" data-bet="30">30</button>
              <button type="button" data-bet="40">40</button>
              <button type="button" data-bet="50">50</button>
            </div>
            <button class="primary" id="confirmBetBtn" type="button">确认下注</button>
          </div>
          <div class="action-buttons">
            <button class="danger" id="standBtn" type="button">不要了</button>
            <button class="primary" id="hitBtn" type="button">要！</button>
            <button class="warning" id="splitBtn" type="button">分牌</button>
            <button class="success" id="revealBtn" type="button">亮庄家牌</button>
          </div>
        </div>

        <section class="settlement-sheet" id="settlementSheet" aria-label="本局结算">
          <div>
            <span class="eyebrow">本局结束</span>
            <h2>结算完成</h2>
          </div>
          <div class="settlement-events" id="settlementEvents"></div>
          <button class="primary large" id="nextRoundBtn" type="button">下一局</button>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
